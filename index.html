<!DOCTYPE html>
<html lang="ja">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.csvランダム出題</title>

        .left {width:20px;background-color:#f0f0f0;padding: 10px;}
        .centor {width: 100px;background-color:#d0eaff;padding: 10px;}
        .right {flex:1;background-color:#f0f0f0;padding: 10px;white-space: nowrap;}
        .panel{display:grid;gap:8px;margin-top:12px;}
    </style>
</head>

            <div id="mon_7"></div>
            <div id="mon_8"></div>
            <div id="mon_9"></div>
            <div id="mon_10"></div>
        </div>
        <div class="centor">
            <div id="syu_1"></div>
            <div id="syu_2"></div>
            <div id="syu_3"></div>
            <div id="syu_4"></div>
            <div id="syu_5"></div>
            <div id="syu_6"></div>
            <div id="syu_7"></div>
            <div id="syu_8"></div>
            <div id="syu_9"></div>
            <div id="syu_10"></div>
        </div>
        <div class="right">
            <div id="kot_1"></div>
            <div id="kot_2"></div>
            <div id="kot_3"></div>
            <div id="kot_4"></div>
            <div id="kot_5"></div>
            <div id="kot_6"></div>
            <div id="kot_7"></div>
            <div id="kot_8"></div>
            <div id="kot_9"></div>
            <div id="kot_10"></div>
        </div>
    </div>
    <div class="panel">
        <button onclick="ca()">回答</button>
    </div>
    <script src="random.js"></script>
</body>
</html>
